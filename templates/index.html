<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>強化學習互動應用</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #eef0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
    }

    h1 {
      font-size: 1.75rem;
      color: #1a1a2e;
      margin-bottom: 22px;
      letter-spacing: -0.02em;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 22px;
      box-shadow: 0 2px 14px rgba(0,0,0,.08);
      width: 100%;
      max-width: 720px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #888;
      margin-bottom: 12px;
    }

    /* ── Controls ───────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    label { font-size: .9rem; color: #333; }

    input[type="number"] {
      width: 64px;
      padding: 6px 10px;
      border: 1.5px solid #ccc;
      border-radius: 7px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="number"]:focus { border-color: #4a90d9; }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .02em;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    button:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.15); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: .38; cursor: not-allowed; }

    .btn-blue   { background: #3d8ef0; color: #fff; }
    .btn-green  { background: #27ae60; color: #fff; }
    .btn-orange { background: #e67e22; color: #fff; }
    .btn-gray   { background: #95a5a6; color: #fff; }

    /* ── Status bar ─────────────────────────────────────────── */
    #status {
      background: #f0f6ff;
      border-left: 4px solid #3d8ef0;
      padding: 11px 16px;
      border-radius: 0 8px 8px 0;
      font-size: .95rem;
      color: #2c3e50;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    /* ── Grid ───────────────────────────────────────────────── */
    #grid-wrap {
      display: flex;
      justify-content: center;
      padding: 4px 0 6px;
      overflow-x: auto;
    }

    #grid {
      display: inline-grid;
      gap: 4px;
      background: #b8bcc8;
      padding: 4px;
      border-radius: 10px;
    }

    .cell {
      width: 74px;
      height: 74px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background .18s, filter .12s;
      position: relative;
    }
    .cell:hover { filter: brightness(.92); }

    /* Cell states */
    .cell.start    { background: #2ecc71; }
    .cell.goal     { background: #e74c3c; }
    .cell.obstacle { background: #7f8c8d; cursor: default; }
    .cell.obstacle:hover { filter: none; }
    .cell.path     { background: #a8e6cf; }

    /* Arrow */
    .cell-arrow {
      font-size: 28px;
      line-height: 1;
      color: #2c3e50;
    }
    .cell.start .cell-arrow,
    .cell.goal  .cell-arrow { color: #fff; }
    .cell.obstacle .cell-arrow { color: rgba(255,255,255,.7); font-size: 20px; }
    .cell.path .cell-arrow { color: #1a6b47; }

    /* Value */
    .cell-value {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-top: 3px;
      letter-spacing: .01em;
    }
    .cell.start .cell-value,
    .cell.goal  .cell-value { color: rgba(255,255,255,.92); }
    .cell.path .cell-value  { color: #1a6b47; }

    /* ── Action buttons ─────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Legend ─────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: .85rem;
      color: #555;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-box  {
      width: 20px; height: 20px;
      border-radius: 4px;
      border: 1.5px solid #ccc;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<h1>強化學習互動應用</h1>

<!-- Phase 1: Grid setup -->
<div class="card">
  <div class="card-title">第一階段 — 地圖設定</div>
  <div class="controls">
    <label for="nInput">格子大小（5 ~ 9）：</label>
    <input type="number" id="nInput" value="5" min="5" max="9" />
    <button class="btn-blue"  onclick="initGrid()">建立地圖</button>
    <button class="btn-gray"  onclick="resetGrid()">重設</button>
  </div>
</div>

<!-- Status -->
<div class="card" style="padding:0 22px;">
  <div id="status">請先輸入格子大小並按「建立地圖」</div>
</div>

<!-- Grid -->
<div class="card">
  <div class="card-title">地圖</div>
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>
</div>

<!-- Phase 2 & 3 -->
<div class="card">
  <div class="card-title">第二 / 三階段 — 策略計算</div>
  <div class="action-row">
    <button class="btn-green"  id="btnRandom" onclick="doRandomPolicy()"   disabled>生成隨機策略</button>
    <button class="btn-orange" id="btnVI"     onclick="doValueIteration()" disabled>執行價值迭代</button>
  </div>
</div>

<!-- Legend -->
<div class="card">
  <div class="card-title">圖例</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#2ecc71;border-color:#2ecc71"></div>起點</div>
    <div class="legend-item"><div class="legend-box" style="background:#e74c3c;border-color:#e74c3c"></div>終點</div>
    <div class="legend-item"><div class="legend-box" style="background:#7f8c8d;border-color:#7f8c8d"></div>障礙物</div>
    <div class="legend-item"><div class="legend-box" style="background:#fff"></div>一般格子（↑ 箭頭 + V 值）</div>
    <div class="legend-item"><div class="legend-box" style="background:#a8e6cf;border-color:#1a6b47"></div>最佳路徑</div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const S = {
  n: 0,
  start: null,       // [r, c]
  goal:  null,       // [r, c]
  obstacles: [],     // [[r,c], ...]
  phase: 'init',     // init | start | goal | obstacle | done
  cellData: {},      // { "r,c": { symbol, value, on_path } }
  pathSet: new Set() // Set of "r,c" keys on optimal path
};

// ── Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function refreshButtons() {
  const ready = S.phase === 'done';
  document.getElementById('btnRandom').disabled = !ready;
  document.getElementById('btnVI').disabled     = !ready;
}

function cellType(r, c) {
  if (S.start     && S.start[0] === r && S.start[1] === c) return 'start';
  if (S.goal      && S.goal[0]  === r && S.goal[1]  === c) return 'goal';
  if (S.obstacles.some(o => o[0] === r && o[1] === c))     return 'obstacle';
  if (S.pathSet.has(`${r},${c}`))                          return 'path';
  return 'normal';
}

// ── Grid rendering ────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${S.n}, 74px)`;

  for (let r = 0; r < S.n; r++) {
    for (let c = 0; c < S.n; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c-${r}-${c}`;
      cell.addEventListener('click', () => handleClick(r, c));

      const arrow = document.createElement('div');
      arrow.className = 'cell-arrow';
      arrow.id = `a-${r}-${c}`;

      const val = document.createElement('div');
      val.className = 'cell-value';
      val.id = `v-${r}-${c}`;

      cell.appendChild(arrow);
      cell.appendChild(val);
      grid.appendChild(cell);
    }
  }
  refreshAllCells();
}

function refreshAllCells() {
  for (let r = 0; r < S.n; r++)
    for (let c = 0; c < S.n; c++)
      refreshCell(r, c);
}

function refreshCell(r, c) {
  const cell  = document.getElementById(`c-${r}-${c}`);
  const arrow = document.getElementById(`a-${r}-${c}`);
  const val   = document.getElementById(`v-${r}-${c}`);
  if (!cell) return;

  const type = cellType(r, c);
  cell.className = `cell${type !== 'normal' ? ' ' + type : ''}`;

  const d = S.cellData[`${r},${c}`];

  switch (type) {
    case 'start':
      arrow.textContent = d?.symbol || 'S';
      val.textContent   = d?.value != null ? d.value.toFixed(2) : '';
      break;
    case 'goal':
      arrow.textContent = '★';
      val.textContent   = d?.value != null ? d.value.toFixed(2) : '';
      break;
    case 'obstacle':
      arrow.textContent = '✕';
      val.textContent   = '';
      break;
    case 'path':
      arrow.textContent = d?.symbol || '';
      val.textContent   = d?.value != null ? d.value.toFixed(2) : '';
      break;
    default:
      arrow.textContent = d?.symbol || '';
      val.textContent   = d?.value != null ? d.value.toFixed(2) : '';
  }
}

// ── Click logic ───────────────────────────────────────────────────────────
function handleClick(r, c) {
  if (S.phase === 'init' || S.phase === 'done') return;
  if (cellType(r, c) !== 'normal') return;   // already assigned

  if (S.phase === 'start') {
    S.start = [r, c];
    S.phase = 'goal';
    setStatus('請點擊格子設定終點（紅色）');

  } else if (S.phase === 'goal') {
    S.goal  = [r, c];
    const need = S.n - 2;
    if (need > 0) {
      S.phase = 'obstacle';
      setStatus(`請設定障礙物（還剩 ${need} 個）`);
    } else {
      S.phase = 'done';
      setStatus('設定完成！可執行策略計算');
      refreshButtons();
    }

  } else if (S.phase === 'obstacle') {
    S.obstacles.push([r, c]);
    const left = S.n - 2 - S.obstacles.length;
    if (left <= 0) {
      S.phase = 'done';
      setStatus('設定完成！可執行策略計算');
      refreshButtons();
    } else {
      setStatus(`請設定障礙物（還剩 ${left} 個）`);
    }
  }

  refreshCell(r, c);
}

// ── Grid init / reset ─────────────────────────────────────────────────────
async function initGrid() {
  const n = parseInt(document.getElementById('nInput').value);
  const res  = await fetch('/set_grid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ n })
  });
  const data = await res.json();

  S.n         = data.n;
  S.start     = null;
  S.goal      = null;
  S.obstacles = [];
  S.phase     = 'start';
  S.cellData  = {};
  S.pathSet   = new Set();

  renderGrid();
  setStatus('請點擊格子設定起點（綠色）');
  refreshButtons();
}

function resetGrid() {
  S.start     = null;
  S.goal      = null;
  S.obstacles = [];
  S.cellData  = {};
  S.pathSet   = new Set();
  S.phase     = S.n > 0 ? 'start' : 'init';

  if (S.n > 0) {
    renderGrid();
    setStatus('請點擊格子設定起點（綠色）');
  }
  refreshButtons();
}

// ── API calls ─────────────────────────────────────────────────────────────
function applyResponse(data) {
  S.cellData = data.cells;
  S.pathSet  = new Set(
    Object.entries(data.cells)
      .filter(([, v]) => v.on_path)
      .map(([k]) => k)
  );
  refreshAllCells();
}

async function doRandomPolicy() {
  setStatus('計算中，請稍候…');
  try {
    const res = await fetch('/random_policy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ n: S.n, start: S.start, goal: S.goal, obstacles: S.obstacles })
    });
    applyResponse(await res.json());
    setStatus('隨機策略生成完畢 ✔  已完成策略評估（Policy Evaluation），各格顯示 V(s) 值');
  } catch (e) {
    setStatus('錯誤：' + e.message);
  }
}

async function doValueIteration() {
  setStatus('執行價值迭代中，請稍候…');
  try {
    const res = await fetch('/value_iteration', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ n: S.n, start: S.start, goal: S.goal, obstacles: S.obstacles })
    });
    applyResponse(await res.json());
    setStatus('價值迭代完成 ✔  顯示最佳策略箭頭與更新後 V(s) 值');
  } catch (e) {
    setStatus('錯誤：' + e.message);
  }
}
</script>
</body>
</html>
